<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="400" viewBox="0 0 1440 400">
  <defs>
    <!-- Yellow glow for accent stars -->
    <filter id="gy" x="-200%" y="-200%" width="500%" height="500%">
      <feGaussianBlur stdDeviation="8" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <!-- Soft white glow for bright stars -->
    <filter id="gw" x="-150%" y="-150%" width="400%" height="400%">
      <feGaussianBlur stdDeviation="2.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <!-- Nebula 1: large right-center glow -->
    <radialGradient id="neb1" cx="1094" cy="184" r="480" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#162d5a" stop-opacity="0.65"/>
      <stop offset="55%"  stop-color="#0d1f42" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#080e1a" stop-opacity="0"/>
    </radialGradient>
    <!-- Nebula 2: secondary lower-center -->
    <radialGradient id="neb2" cx="800" cy="300" r="380" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#0f2448" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#080e1a" stop-opacity="0"/>
    </radialGradient>
    <!-- Meteor trail 1 -->
    <linearGradient id="m1" x1="650" y1="28" x2="740" y2="76" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.55"/>
    </linearGradient>
    <!-- Meteor trail 2 -->
    <linearGradient id="m2" x1="1082" y1="15" x2="1158" y2="55" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.45"/>
    </linearGradient>
  </defs>

  <!-- Deep space background -->
  <rect width="1440" height="400" fill="#080e1a"/>

  <!-- Nebula glow clouds -->
  <rect width="1440" height="400" fill="url(#neb1)"/>
  <rect width="1440" height="400" fill="url(#neb2)"/>

  <!-- Stars: tiny dim -->
  <g fill="#ffffff">
    <circle cx="468"  cy="52"  r="0.7" opacity="0.38"/>
    <circle cx="523"  cy="178" r="0.6" opacity="0.30"/>
    <circle cx="590"  cy="100" r="0.7" opacity="0.42"/>
    <circle cx="648"  cy="305" r="0.6" opacity="0.32"/>
    <circle cx="687"  cy="42"  r="0.7" opacity="0.40"/>
    <circle cx="725"  cy="248" r="0.6" opacity="0.28"/>
    <circle cx="760"  cy="368" r="0.7" opacity="0.35"/>
    <circle cx="810"  cy="88"  r="0.6" opacity="0.42"/>
    <circle cx="843"  cy="310" r="0.7" opacity="0.38"/>
    <circle cx="878"  cy="18"  r="0.6" opacity="0.45"/>
    <circle cx="912"  cy="375" r="0.7" opacity="0.30"/>
    <circle cx="945"  cy="142" r="0.6" opacity="0.40"/>
    <circle cx="968"  cy="332" r="0.7" opacity="0.35"/>
    <circle cx="1008" cy="52"  r="0.6" opacity="0.42"/>
    <circle cx="1048" cy="372" r="0.7" opacity="0.28"/>
    <circle cx="1078" cy="218" r="0.6" opacity="0.35"/>
    <circle cx="1095" cy="125" r="0.7" opacity="0.40"/>
    <circle cx="1128" cy="348" r="0.6" opacity="0.38"/>
    <circle cx="1158" cy="72"  r="0.7" opacity="0.45"/>
    <circle cx="1175" cy="290" r="0.6" opacity="0.32"/>
    <circle cx="1205" cy="168" r="0.7" opacity="0.38"/>
    <circle cx="1232" cy="38"  r="0.6" opacity="0.42"/>
    <circle cx="1248" cy="315" r="0.7" opacity="0.35"/>
    <circle cx="1275" cy="112" r="0.6" opacity="0.40"/>
    <circle cx="1298" cy="365" r="0.7" opacity="0.28"/>
    <circle cx="1318" cy="58"  r="0.6" opacity="0.45"/>
    <circle cx="1342" cy="278" r="0.7" opacity="0.35"/>
    <circle cx="1365" cy="148" r="0.6" opacity="0.38"/>
    <circle cx="1388" cy="330" r="0.7" opacity="0.32"/>
    <circle cx="1415" cy="95"  r="0.6" opacity="0.42"/>
    <circle cx="1432" cy="245" r="0.7" opacity="0.35"/>
  </g>

  <!-- Stars: small -->
  <g fill="#ffffff">
    <circle cx="487"  cy="135" r="1.1" opacity="0.50"/>
    <circle cx="555"  cy="270" r="1.0" opacity="0.45"/>
    <circle cx="618"  cy="195" r="1.2" opacity="0.52"/>
    <circle cx="670"  cy="65"  r="1.0" opacity="0.48"/>
    <circle cx="722"  cy="318" r="1.1" opacity="0.45"/>
    <circle cx="778"  cy="162" r="1.2" opacity="0.50"/>
    <circle cx="835"  cy="235" r="1.0" opacity="0.48"/>
    <circle cx="892"  cy="48"  r="1.1" opacity="0.55"/>
    <circle cx="950"  cy="282" r="1.2" opacity="0.50"/>
    <circle cx="1002" cy="168" r="1.0" opacity="0.48"/>
    <circle cx="1055" cy="315" r="1.1" opacity="0.45"/>
    <circle cx="1108" cy="78"  r="1.2" opacity="0.52"/>
    <circle cx="1155" cy="210" r="1.0" opacity="0.50"/>
    <circle cx="1222" cy="355" r="1.1" opacity="0.45"/>
    <circle cx="1265" cy="148" r="1.2" opacity="0.50"/>
    <circle cx="1308" cy="245" r="1.0" opacity="0.48"/>
    <circle cx="1352" cy="82"  r="1.1" opacity="0.55"/>
    <circle cx="1395" cy="178" r="1.2" opacity="0.50"/>
  </g>

  <!-- Stars: medium -->
  <g fill="#cdd8f0">
    <circle cx="538"  cy="90"  r="1.5" opacity="0.62"/>
    <circle cx="612"  cy="248" r="1.6" opacity="0.58"/>
    <circle cx="688"  cy="158" r="1.5" opacity="0.65"/>
    <circle cx="755"  cy="335" r="1.6" opacity="0.55"/>
    <circle cx="832"  cy="115" r="1.5" opacity="0.62"/>
    <circle cx="905"  cy="268" r="1.6" opacity="0.55"/>
    <circle cx="988"  cy="72"  r="1.5" opacity="0.65"/>
    <circle cx="1065" cy="195" r="1.6" opacity="0.58"/>
    <circle cx="1138" cy="308" r="1.5" opacity="0.62"/>
    <circle cx="1215" cy="108" r="1.6" opacity="0.65"/>
    <circle cx="1285" cy="235" r="1.5" opacity="0.58"/>
    <circle cx="1355" cy="165" r="1.6" opacity="0.62"/>
  </g>

  <!-- Stars: bright with glow -->
  <g fill="#dde8ff" filter="url(#gw)">
    <circle cx="574"  cy="168" r="2.2" opacity="0.85"/>
    <circle cx="735"  cy="225" r="2.0" opacity="0.80"/>
    <circle cx="918"  cy="130" r="2.3" opacity="0.85"/>
    <circle cx="1030" cy="295" r="2.1" opacity="0.78"/>
    <circle cx="1148" cy="182" r="2.2" opacity="0.85"/>
    <circle cx="1260" cy="88"  r="2.0" opacity="0.80"/>
    <circle cx="1375" cy="248" r="2.3" opacity="0.85"/>
  </g>

  <!-- Planet silhouette: top-right, partially off-screen -->
  <circle cx="1420" cy="-30" r="132" fill="none" stroke="#162d5a" stroke-width="10" opacity="0.22"/>
  <circle cx="1420" cy="-30" r="125" fill="#0b1828"/>
  <circle cx="1420" cy="-30" r="125" fill="none" stroke="#1e3d6f" stroke-width="2" opacity="0.45"/>

  <!-- Meteor trails -->
  <path d="M650,28 L740,76"   stroke="url(#m1)" stroke-width="1.5" fill="none"/>
  <path d="M1082,15 L1158,55" stroke="url(#m2)" stroke-width="1.3" fill="none"/>

  <!-- Constellation lines: A(858,165) B(1045,88) C(1185,248) D(1322,178) -->
  <line x1="858"  y1="165" x2="1045" y2="88"  stroke="#eab308" stroke-width="0.8" opacity="0.30"/>
  <line x1="1045" y1="88"  x2="1322" y2="178" stroke="#eab308" stroke-width="0.8" opacity="0.28"/>
  <line x1="1322" y1="178" x2="1185" y2="248" stroke="#eab308" stroke-width="0.8" opacity="0.28"/>
  <line x1="1185" y1="248" x2="858"  y2="165" stroke="#eab308" stroke-width="0.8" opacity="0.25"/>
  <!-- Extensions to outer bright stars -->
  <line x1="858"  y1="165" x2="574"  y2="168" stroke="#eab308" stroke-width="0.6" opacity="0.18"/>
  <line x1="1322" y1="178" x2="1375" y2="248" stroke="#eab308" stroke-width="0.6" opacity="0.18"/>

  <!-- Targeting reticle around star C -->
  <circle cx="1185" cy="248" r="26" fill="none" stroke="#334155" stroke-width="0.8" opacity="0.55"/>
  <circle cx="1185" cy="248" r="17" fill="none" stroke="#334155" stroke-width="0.6" opacity="0.40"/>
  <line x1="1159" y1="248" x2="1166" y2="248" stroke="#334155" stroke-width="1" opacity="0.60"/>
  <line x1="1204" y1="248" x2="1211" y2="248" stroke="#334155" stroke-width="1" opacity="0.60"/>
  <line x1="1185" y1="222" x2="1185" y2="229" stroke="#334155" stroke-width="1" opacity="0.60"/>
  <line x1="1185" y1="267" x2="1185" y2="274" stroke="#334155" stroke-width="1" opacity="0.60"/>

  <!-- Orbital arc: dashed ellipse, bottom-right -->
  <ellipse cx="1320" cy="430" rx="225" ry="158"
           fill="none" stroke="#1d3557" stroke-width="0.8"
           stroke-dasharray="4 7" opacity="0.35"
           transform="rotate(-8 1320 430)"/>

  <!-- Yellow accent stars: on top of everything -->
  <circle cx="858"  cy="165" r="5.0" fill="#eab308" filter="url(#gy)"/>
  <circle cx="858"  cy="165" r="2.2" fill="#fef9c3"/>

  <circle cx="1045" cy="88"  r="4.5" fill="#eab308" filter="url(#gy)"/>
  <circle cx="1045" cy="88"  r="2.0" fill="#fef9c3"/>

  <circle cx="1185" cy="248" r="6.0" fill="#eab308" filter="url(#gy)"/>
  <circle cx="1185" cy="248" r="2.8" fill="#fef9c3"/>

  <circle cx="1322" cy="178" r="4.5" fill="#eab308" filter="url(#gy)"/>
  <circle cx="1322" cy="178" r="2.0" fill="#fef9c3"/>
</svg>
